name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build CSS
        run: bash web/css/build.sh

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o simple-daily-termux-${{ matrix.suffix }} .

      - name: Package Artifact
        run: |
          tar -czf simple-daily-termux-${{ matrix.suffix }}.tar.gz \
            simple-daily-termux-${{ matrix.suffix }} \
            config.example.json \
            scripts/smoke.sh
          sha256sum simple-daily-termux-${{ matrix.suffix }}.tar.gz \
            > simple-daily-termux-${{ matrix.suffix }}.tar.gz.sha256

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            simple-daily-termux-${{ matrix.suffix }}.tar.gz
            simple-daily-termux-${{ matrix.suffix }}.tar.gz.sha256
          generate_release_notes: true
