name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: '7'
            suffix: linux-armv7

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build CSS
        run: bash web/css/build.sh

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '7' }}
        run: |
          go build -o simple-daily-termux-${{ matrix.suffix }} .
          cp config.example.json config.example.json
          cp scripts/smoke.sh smoke.sh

      - name: Package Artifact
        run: |
          tar -czf simple-daily-termux-${{ matrix.suffix }}.tar.gz \
            simple-daily-termux-${{ matrix.suffix }} \
            config.example.json \
            scripts/smoke.sh
          sha256sum simple-daily-termux-${{ matrix.suffix }}.tar.gz \
            > simple-daily-termux-${{ matrix.suffix }}.tar.gz.sha256

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-daily-termux-${{ matrix.suffix }}
          path: |
            simple-daily-termux-${{ matrix.suffix }}.tar.gz
            simple-daily-termux-${{ matrix.suffix }}.tar.gz.sha256

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            simple-daily-termux-${{ matrix.suffix }}.tar.gz
            simple-daily-termux-${{ matrix.suffix }}.tar.gz.sha256
          generate_release_notes: true
