# ============================================================
# simple-daily-termux 与 Blog-termux 联动 Nginx 配置片段
# ============================================================
# 用法：将以下两个 location 块添加到 Blog-termux 的 server {} 中
# Go 后端默认监听 127.0.0.1:8090
# ============================================================

    # ---- simple-daily-termux SPA（反代到 Go 后端）----
    location /simpledaily/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- Blog-termux 仪表盘第 9 张卡片数据源 ----
    location /api/summary {
        proxy_pass http://127.0.0.1:8090/api/summary;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store";
    }
