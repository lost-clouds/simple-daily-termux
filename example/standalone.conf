# ============================================================
# simple-daily-termux 独立部署 Nginx 配置
# ============================================================
# 用法：将此文件引入 nginx 主配置，或直接放在 conf.d/ 目录
# 部署时将所有 /path/to/simple-daily-termux 替换为实际路径
# ============================================================

server {
    listen 8090;
    charset utf-8;

    # ---- SPA + API（全部由 Go 后端提供）----
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
